<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#F6F7F9" />
    <script>
      // Apply stored appearance before first paint to avoid theme flash.
      (function () {
        try {
          var p = JSON.parse(localStorage.getItem("sw:prefs") || "{}").appearance || {};
          var dark =
            p.theme === "dark" ||
            (p.theme !== "light" && matchMedia("(prefers-color-scheme: dark)").matches);
          var h = document.documentElement;
          h.classList.toggle("dark", dark);
          if (p.accent) h.style.setProperty("--accent-base", p.accent);
          if (p.density) h.dataset.density = p.density;
          if (p.fontScale) h.dataset.fontscale = p.fontScale;
          if (p.animation) h.dataset.anim = p.animation;
        } catch (e) {}
      })();
    </script>
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/icons/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <title>SheetWatch — watch your sheets</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
